name: CI

on:
  pull_request:
  push:
    branches:
      - main

jobs:
  check:
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Validate manifest JSON
        run: node -e "JSON.parse(require('fs').readFileSync('manifest.json','utf8'))"

      - name: Check content script syntax
        run: node --check content.js

      - name: Build release archives
        run: scripts/package-release.sh 0.3.0

      - name: Verify archive contents
        run: |
          node <<'NODE'
          const { execFileSync } = require("node:child_process");
          const expected = ["content.js", "manifest.json"];
          for (const archive of ["dist/fix-quera-0.3.0.zip", "dist/fix-quera-firefox-v0.3.0.zip"]) {
            const names = execFileSync("unzip", ["-Z1", archive], { encoding: "utf8" })
              .trim()
              .split(/\n/)
              .filter(Boolean)
              .sort();
            if (JSON.stringify(names) !== JSON.stringify(expected)) {
              throw new Error(`${archive} contains ${names.join(", ")}`);
            }
          }
          NODE
